// --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---

const loadPdfJs = async () => {
  if (window.pdfjsLib) return window.pdfjsLib;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

const applySharpen = (ctx, width, height, mix = 0.5) => {
  const imageData = ctx.getImageData(0, 0, width, height);
  const data = imageData.data;
  const copy = new Uint8ClampedArray(data);
  const weights = [ 0, -1, 0, -1, 5, -1, 0, -1, 0 ];
  const side = 3;
  const halfSide = 1;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const dstOff = (y * width + x) * 4;
      if (copy[dstOff + 3] === 0) continue; // Игнорируем прозрачный фон (защита от ореолов)

      let r = 0, g = 0, b = 0;
      for (let cy = 0; cy < side; cy++) {
        for (let cx = 0; cx < side; cx++) {
          const scy = y + cy - halfSide;
          const scx = x + cx - halfSide;
          if (scy >= 0 && scy < height && scx >= 0 && scx < width) {
            const srcOff = (scy * width + scx) * 4;
            const wt = weights[cy * side + cx];
            r += copy[srcOff] * wt;
            g += copy[srcOff + 1] * wt;
            b += copy[srcOff + 2] * wt;
          }
        }
      }
      data[dstOff] = data[dstOff] * (1 - mix) + r * mix;
      data[dstOff + 1] = data[dstOff + 1] * (1 - mix) + g * mix;
      data[dstOff + 2] = data[dstOff + 2] * (1 - mix) + b * mix;
    }
  }
  ctx.putImageData(imageData, 0, 0);
};

const createCheckerPattern = () => {
  const patternCanvas = document.createElement('canvas');
  patternCanvas.width = 20; patternCanvas.height = 20;
  const pCtx = patternCanvas.getContext('2d');
  pCtx.fillStyle = '#e5e7eb'; pCtx.fillRect(0, 0, 10, 10); pCtx.fillRect(10, 10, 10, 10);
  pCtx.fillStyle = '#ffffff'; pCtx.fillRect(10, 0, 10, 10); pCtx.fillRect(0, 10, 10, 10);
  return patternCanvas;
};
const cachedPatternCanvas = createCheckerPattern();

// --- ОСНОВНОЙ КОМПОНЕНТ ---

function LogoEditor() {
  const [lang, setLang] = useState('en'); // 'en' или 'ru'
  const t = (key) => translations[lang][key] || key;
  
  const [imageLoaded, setImageLoaded] = useState(false);
  const [activeTool, setActiveTool] = useState('select');
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
  const lastPosRef = useRef(null); 
  
  const [history, setHistory] = useState([]);
  const [historyIndex, setHistoryIndex] = useState(-1);

  const [wandSettings, setWandSettings] = useState({ tolerance: 30, mode: 'remove', targetColor: '#ffffff' });
  const [smoothStrength, setSmoothStrength] = useState(0); 
  const [eraserSize, setEraserSize] = useState(20);
  const [recolorHex, setRecolorHex] = useState('#000000');
  const [exportSettings, setExportSettings] = useState({ 
    format: 'svg', sizePreset: 'original', filename: 'logo_edited',
    customWidth: 1024, customHeight: 1024, aspectLocked: true
  });
  const [upscaleSettings, setUpscaleSettings] = useState({ factor: 1, aggressive: false });
  const [sharpness, setSharpness] = useState(0); 
  
  const containerRef = useRef(null);
  const mainCanvasRef = useRef(null);
  const workCanvasRef = useRef(null);
  const pinchStartRef = useRef(null);
  const zoomStartRef = useRef(null);
  
  // Референсы для хранения чистых оригиналов (до предпросмотра эффектов)
  const baseSmoothStateRef = useRef(null);
  const baseUpscaleStateRef = useRef(null);
  const postUpscaleBaseRef = useRef(null);
  
  // Централизованная смена инструментов (Фиксирует эффекты перед переходом)
  const handleToolChange = (newTool) => {
    // Если уходим с вкладки со сглаживанием и оно активно — сохраняем результат
    if (activeTool === 'wand' && smoothStrength > 0) {
      saveToHistory(workCanvasRef.current);
    }
    // Если уходим с Upscale и он применялся — сохраняем результат
    if (activeTool === 'upscale' && (upscaleSettings.factor > 1 || sharpness > 0)) {
      saveToHistory(workCanvasRef.current);
    }

    // Сброс локальных превью
    baseSmoothStateRef.current = null;
    setSmoothStrength(0);
    baseUpscaleStateRef.current = null;
    postUpscaleBaseRef.current = null;
    setUpscaleSettings(s => ({ ...s, factor: 1 }));
    setSharpness(0);

    setActiveTool(newTool);
  };

  const initImage = async (file) => {
    const isPdf = file.type === 'application/pdf';
    if (isPdf) {
      try {
        const pdfjs = await loadPdfJs();
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 3.0 }); 
        
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        setupWorkCanvas(canvas);
      } catch (err) {
        alert(t('err_pdf'));
        console.error(err);
      }
    } else {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        setupWorkCanvas(canvas);
		URL.revokeObjectURL(img.src);
      };
      img.src = URL.createObjectURL(file);
    }
  };

  const setupWorkCanvas = (sourceCanvas) => {
    const workCanvas = workCanvasRef.current;
    if (!workCanvas) return;
    workCanvas.width = sourceCanvas.width;
    workCanvas.height = sourceCanvas.height;
    const ctx = workCanvas.getContext('2d', { willReadFrequently: true });
    ctx.clearRect(0, 0, workCanvas.width, workCanvas.height);
    ctx.drawImage(sourceCanvas, 0, 0);
    
    setExportSettings(s => ({...s, customWidth: sourceCanvas.width, customHeight: sourceCanvas.height}));
    setImageLoaded(true);
    const container = containerRef.current;
    const cw = container ? container.clientWidth : 800;
    const ch = container ? container.clientHeight : 600;
    setZoom(Math.min(cw / sourceCanvas.width, ch / sourceCanvas.height, 1));
    setPan({ x: 0, y: 0 });
    
    setHistory([]);
    setHistoryIndex(-1);
    
    baseSmoothStateRef.current = null;
    baseUpscaleStateRef.current = null;
    postUpscaleBaseRef.current = null;
    setSmoothStrength(0);
    setUpscaleSettings(s => ({ ...s, factor: 1 }));
    setSharpness(0);

    saveToHistory(workCanvas);
    renderMainCanvas();
  };

  const renderMainCanvas = useCallback(() => {
    const mainCanvas = mainCanvasRef.current;
    const workCanvas = workCanvasRef.current;
    if (!mainCanvas || !workCanvas || !imageLoaded) return;

    const ctx = mainCanvas.getContext('2d');
    const container = containerRef.current;
    mainCanvas.width = container.clientWidth;
    mainCanvas.height = container.clientHeight;

    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    
    const pattern = ctx.createPattern(cachedPatternCanvas, 'repeat');
    ctx.fillStyle = pattern;
    ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

    ctx.save();
    ctx.translate(mainCanvas.width / 2 + pan.x, mainCanvas.height / 2 + pan.y);
    ctx.scale(zoom, zoom);
    
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    
    ctx.drawImage(workCanvas, -workCanvas.width / 2, -workCanvas.height / 2);
    ctx.restore();
  }, [imageLoaded, pan, zoom]);

  useEffect(() => { renderMainCanvas(); }, [renderMainCanvas]);

  const saveToHistory = (canvas) => {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    
    setHistory(prev => {
        const validHistory = prev.slice(0, historyIndex + 1);
        validHistory.push({ width: canvas.width, height: canvas.height, data: imageData });
        if (validHistory.length > 15) validHistory.shift();
        setHistoryIndex(validHistory.length - 1);
        return validHistory;
    });
  };

  const undo = () => {
    if (historyIndex > 0) {
      restoreState(history[historyIndex - 1]);
      setHistoryIndex(historyIndex - 1);
    }
  };

  const redo = () => {
    if (historyIndex < history.length - 1) {
      restoreState(history[historyIndex + 1]);
      setHistoryIndex(historyIndex + 1);
    }
  };

  const restoreState = (state) => {
    const workCanvas = workCanvasRef.current;
    workCanvas.width = state.width;
    workCanvas.height = state.height;
    workCanvas.getContext('2d').putImageData(state.data, 0, 0);
    
    // Сброс превью при перемещении по истории
    baseSmoothStateRef.current = null;
    setSmoothStrength(0);
    baseUpscaleStateRef.current = null;
    postUpscaleBaseRef.current = null;
    setUpscaleSettings(s => ({ ...s, factor: 1 }));
    setSharpness(0);
    
    renderMainCanvas();
  };

  const getEventCoords = (e) => {
    const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
    const rect = mainCanvasRef.current.getBoundingClientRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
  };

  const getWorkCanvasCoords = (screenX, screenY) => {
    const centerX = mainCanvasRef.current.width / 2 + pan.x;
    const centerY = mainCanvasRef.current.height / 2 + pan.y;
    return {
      x: (screenX - centerX) / zoom + workCanvasRef.current.width / 2,
      y: (screenY - centerY) / zoom + workCanvasRef.current.height / 2
    };
  };

  const handlePointerDown = (e) => {
    if (!imageLoaded) return;
	
	// --- КОД ДЛЯ PINCH-TO-ZOOM ---
    if (e.touches && e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartRef.current = Math.hypot(dx, dy); // Запоминаем начальное расстояние
      zoomStartRef.current = zoom; // Запоминаем текущий зум
      return; // Выходим, чтобы не срабатывало обычное рисование
    }
	
    const { x, y } = getEventCoords(e);
    const isAltOrMiddle = e.button === 1 || e.altKey;

    if (activeTool === 'select' || isAltOrMiddle) {
      setIsDragging(true);
      setDragStart({ x: x - pan.x, y: y - pan.y });
    } else if (activeTool === 'crop') {
      setIsDragging(true);
      const coords = getWorkCanvasCoords(x, y);
      lastPosRef.current = coords;
      applyEraserContinuous(coords, coords);
    } else if (activeTool === 'wand') {
      applyMagicWand(x, y);
    }
  };

  const handlePointerMove = (e) => {
    if (!imageLoaded) return;
	
	// --- КОД ДЛЯ PINCH-TO-ZOOM ---
    if (e.touches && e.touches.length === 2 && pinchStartRef.current) {
      e.preventDefault(); // Запрещаем браузеру скроллить страницу
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const currentDistance = Math.hypot(dx, dy);
      
      // Вычисляем во сколько раз изменилось расстояние
      const scale = currentDistance / pinchStartRef.current;
      setZoom(Math.min(Math.max(0.1, zoomStartRef.current * scale), 10));
      return;
    }
	
	if (!isDragging) return;
    const { x, y } = getEventCoords(e);
    const isAltOrMiddle = e.button === 1 || e.altKey;

    if (activeTool === 'select' || isAltOrMiddle) {
      setPan({ x: x - dragStart.x, y: y - dragStart.y });
    } else if (activeTool === 'crop') {
      const coords = getWorkCanvasCoords(x, y);
      applyEraserContinuous(lastPosRef.current, coords);
      lastPosRef.current = coords;
    }
  };

  const handlePointerUp = () => {
    // --- КОД ДЛЯ PINCH-TO-ZOOM ---
    pinchStartRef.current = null;
    zoomStartRef.current = null;
	
	if (isDragging && activeTool === 'crop') saveToHistory(workCanvasRef.current);
    setIsDragging(false);
    lastPosRef.current = null;
  };

  const handleWheel = (e) => {
    if (!imageLoaded) return;
    e.preventDefault();
    const scaleAdjust = e.deltaY > 0 ? 0.9 : 1.1;
    setZoom((prev) => Math.min(Math.max(0.1, prev * scaleAdjust), 10));
  };

  // --- ИНСТРУМЕНТЫ ---

  const applyEraserContinuous = (startPos, endPos) => {
    if (!startPos || !endPos) return;
    const workCanvas = workCanvasRef.current;
    const ctx = workCanvas.getContext('2d');
    
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = eraserSize / zoom; 
    
    ctx.beginPath();
    ctx.moveTo(startPos.x, startPos.y);
    ctx.lineTo(endPos.x, endPos.y);
    ctx.stroke();
    ctx.restore();
    
    renderMainCanvas();
  };

  const applyMagicWand = (screenX, screenY) => {
    // Если было активно сглаживание, фиксируем его перед новым удалением фона
    if (smoothStrength > 0) {
      saveToHistory(workCanvasRef.current);
      baseSmoothStateRef.current = null;
      setSmoothStrength(0);
    }

    const workCanvas = workCanvasRef.current;
    const ctx = workCanvas.getContext('2d');
    const { width, height } = workCanvas;
    
    const { x, y } = getWorkCanvasCoords(screenX, screenY);
    if (x < 0 || x >= width || y < 0 || y >= height) return;

    const hex = wandSettings.targetColor.replace('#', '');
    const tr = parseInt(hex.substring(0, 2), 16), tg = parseInt(hex.substring(2, 4), 16), tb = parseInt(hex.substring(4, 6), 16);

    const imageData = ctx.getImageData(0, 0, width, height);
    const data = imageData.data;
    const tolPercent = wandSettings.tolerance / 100;

    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const dr = r - tr, dg = g - tg, db = b - tb;
      const distance = Math.sqrt(0.299 * dr*dr + 0.587 * dg*dg + 0.114 * db*db);
      const distanceRatio = distance / 255;

      if (wandSettings.mode === 'remove') {
        if (distanceRatio <= tolPercent) {
          const edgeThreshold = tolPercent * 0.9;
          if (distanceRatio > edgeThreshold) {
             const alphaMod = (distanceRatio - edgeThreshold) / (tolPercent - edgeThreshold);
             data[i + 3] = data[i + 3] * alphaMod;
          } else {
             data[i + 3] = 0;
          }
        }
      } else {
        if (distanceRatio > tolPercent) {
            const edgeThreshold = Math.min(1, tolPercent * 1.1 + 0.05);
            if (distanceRatio < edgeThreshold) {
               const alphaMod = (edgeThreshold - distanceRatio) / (edgeThreshold - tolPercent);
               data[i + 3] = data[i + 3] * alphaMod;
            } else {
               data[i + 3] = 0;
            }
        }
      }
    }

    ctx.putImageData(imageData, 0, 0);
    saveToHistory(workCanvas); // Сохраняем "сырое" удаление
    renderMainCanvas();
  };

  // Live-Preview Сглаживание (Не накручивается, отталкивается от базы)
  const handleSmoothChange = (e) => {
    const strength = parseInt(e.target.value);
    setSmoothStrength(strength);
    
    const workCanvas = workCanvasRef.current;
    const ctx = workCanvas.getContext('2d');
    const { width, height } = workCanvas;

    // Инициализируем базу один раз при первом движении ползунка
    if (!baseSmoothStateRef.current) {
        baseSmoothStateRef.current = ctx.getImageData(0, 0, width, height);
    }
    
    // Всегда начинаем с чистого оригинального снимка
    ctx.putImageData(baseSmoothStateRef.current, 0, 0); 
    
    if (strength === 0) { 
      renderMainCanvas(); 
      return; 
    }

    const srcData = baseSmoothStateRef.current.data;
    let currentData = new Uint8ClampedArray(srcData);
    let tempBuffer = new Uint8ClampedArray(srcData);

    for (let pass = 0; pass < strength; pass++) {
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = (y * width + x) * 4;
          // Ищем границу непрозрачного и прозрачного
          if (currentData[idx + 3] > 0 && currentData[idx + 3] < 255 || 
             (currentData[idx+3]>0 && (currentData[idx-4+3]===0 || currentData[idx+4+3]===0 || currentData[idx-width*4+3]===0 || currentData[idx+width*4+3]===0))) {
                
             let aSum = 0;
             aSum += currentData[((y-1)*width + (x-1))*4 + 3] + currentData[((y-1)*width + x)*4 + 3] + currentData[((y-1)*width + (x+1))*4 + 3];
             aSum += currentData[(y*width + (x-1))*4 + 3]     + currentData[(y*width + x)*4 + 3]     + currentData[(y*width + (x+1))*4 + 3];
             aSum += currentData[((y+1)*width + (x-1))*4 + 3] + currentData[((y+1)*width + x)*4 + 3] + currentData[((y+1)*width + (x+1))*4 + 3];
             
             tempBuffer[idx + 3] = aSum / 9;
          } else {
             tempBuffer[idx + 3] = currentData[idx + 3];
          }
        }
      }
      let t = currentData; currentData = tempBuffer; tempBuffer = t;
    }
    
    ctx.putImageData(new ImageData(currentData, width, height), 0, 0);
    renderMainCanvas();
  };

  const applyAutoCrop = () => {
    const workCanvas = workCanvasRef.current;
    const ctx = workCanvas.getContext('2d');
    const { width, height } = workCanvas;
    const data = ctx.getImageData(0, 0, width, height).data;

    let minX = width, minY = height, maxX = 0, maxY = 0;
    topLoop: for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) { if (data[(y * width + x) * 4 + 3] > 10) { minY = y; break topLoop; } }
    }
    if (minY === height) return;

    bottomLoop: for (let y = height - 1; y >= 0; y--) {
      for (let x = 0; x < width; x++) { if (data[(y * width + x) * 4 + 3] > 10) { maxY = y; break bottomLoop; } }
    }
    leftLoop: for (let x = 0; x < width; x++) {
      for (let y = minY; y <= maxY; y++) { if (data[(y * width + x) * 4 + 3] > 10) { minX = x; break leftLoop; } }
    }
    rightLoop: for (let x = width - 1; x >= 0; x--) {
      for (let y = minY; y <= maxY; y++) { if (data[(y * width + x) * 4 + 3] > 10) { maxX = x; break rightLoop; } }
    }

    const padding = Math.floor(Math.min(width, height) * 0.05);
    minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
    maxX = Math.min(width, maxX + padding); maxY = Math.min(height, maxY + padding);

    const cropWidth = maxX - minX; const cropHeight = maxY - minY;
    if (cropWidth <= 0 || cropHeight <= 0) return;

    const newCanvas = document.createElement('canvas');
    newCanvas.width = cropWidth; newCanvas.height = cropHeight;
    newCanvas.getContext('2d').drawImage(workCanvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
    
    workCanvas.width = cropWidth; workCanvas.height = cropHeight;
    workCanvas.getContext('2d').drawImage(newCanvas, 0, 0);

    const container = containerRef.current;
    const cw = container ? container.clientWidth : 800;
    const ch = container ? container.clientHeight : 600;
    setZoom(Math.min(cw / sourceCanvas.width, ch / sourceCanvas.height, 1));
    setPan({ x: 0, y: 0 });
    saveToHistory(workCanvas);
    renderMainCanvas();
  };

  // --- Резкость (Live-Preview, не накручивается) ---
  const applySharpnessFilter = (val) => {
    const workCanvas = workCanvasRef.current;
    const ctx = workCanvas.getContext('2d');

    // Если мы не делали апскейл, фиксируем 1x оригинал как базу
    if (!baseUpscaleStateRef.current) {
        baseUpscaleStateRef.current = {
            width: workCanvas.width, height: workCanvas.height,
            data: ctx.getImageData(0, 0, workCanvas.width, workCanvas.height)
        };
    }
    // Если база после апскейла пуста, значит мы работаем в масштабе 1x
    if (!postUpscaleBaseRef.current) {
        postUpscaleBaseRef.current = baseUpscaleStateRef.current;
    }

    const base = postUpscaleBaseRef.current;
    workCanvas.width = base.width;
    workCanvas.height = base.height;
    
    // 1. Всегда возвращаем чистую (несглаженную) версию на холст
    ctx.putImageData(base.data, 0, 0);

    // 2. Поверх чистой версии накладываем резкость
    if (val > 0) {
        applySharpen(ctx, base.width, base.height, val / 100);
    }

    // Убран сброс масштаба (setZoom), чтобы зум не сбрасывался при настройке резкости
    renderMainCanvas();
  };

  const handleSharpnessChange = (e) => {
    const val = parseInt(e.target.value);
    setSharpness(val);
    applySharpnessFilter(val);
  };

  // Upscale: Правильное переключение режимов
  const applyUpscaleToggle = (factor, aggressive = upscaleSettings.aggressive) => {
    const workCanvas = workCanvasRef.current;
    if (!workCanvas) return;

    // Запоминаем оригинальный холст ДО всех апскейлов (для возможности возврата)
    if (!baseUpscaleStateRef.current) {
        baseUpscaleStateRef.current = {
            width: workCanvas.width,
            height: workCanvas.height,
            data: workCanvas.getContext('2d').getImageData(0, 0, workCanvas.width, workCanvas.height)
        };
    }

    setUpscaleSettings({ factor, aggressive });
    const baseState = baseUpscaleStateRef.current;
    const newWidth = Math.round(baseState.width * factor);
    const newHeight = Math.round(baseState.height * factor);

    if (newWidth > 8000 || newHeight > 8000) {
       alert(t('err_large'));
       return;
    }

    const tempBaseCanvas = document.createElement('canvas');
    tempBaseCanvas.width = baseState.width; tempBaseCanvas.height = baseState.height;
    tempBaseCanvas.getContext('2d').putImageData(baseState.data, 0, 0);

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = newWidth; tempCanvas.height = newHeight;
    const tCtx = tempCanvas.getContext('2d');
    
    // Билинейное интерполирование (базовое растяжение)
    tCtx.imageSmoothingEnabled = true;
    tCtx.imageSmoothingQuality = 'high';
    tCtx.drawImage(tempBaseCanvas, 0, 0, newWidth, newHeight);

    if (aggressive) {
        // Агрессивный векторный режим: Мощное размытие + Жесткий контраст
        const blurCanvas = document.createElement('canvas');
        blurCanvas.width = newWidth; blurCanvas.height = newHeight;
        const bCtx = blurCanvas.getContext('2d');
        
        bCtx.filter = `blur(${factor === 4 ? 4 : 2}px)`;
        bCtx.drawImage(tCtx.canvas, 0, 0);
        bCtx.filter = 'none';

        const imageData = bCtx.getImageData(0, 0, newWidth, newHeight);
        const data = imageData.data;
        
        // Мощная кривая контраста, чтобы сплющить градиенты и убить шум
        const contrast = 120; 
        const factorC = (259 * (contrast + 255)) / (255 * (259 - contrast));

        for (let i = 0; i < data.length; i += 4) {
            for (let c = 0; c < 3; c++) {
               data[i + c] = Math.min(255, Math.max(0, factorC * (data[i + c] - 128) + 128));
            }
            // Жестко обрезаем альфу, чтобы сделать векторный край
            let alpha = data[i + 3];
            if (alpha > 0 && alpha < 255) {
                data[i + 3] = Math.max(0, Math.min(255, (alpha - 120) * 5));
            }
        }
        tCtx.putImageData(imageData, 0, 0);
    } else {
        // Бережный стандартный режим: Умная S-кривая для средних тонов
        const imageData = tCtx.getImageData(0, 0, newWidth, newHeight);
        const data = imageData.data;

        // Мягкий контраст, который подчеркивает детали внутри логотипа
        const contrast = 40; 
        const factorC = (259 * (contrast + 255)) / (255 * (259 - contrast));

        for (let i = 0; i < data.length; i += 4) {
            for (let c = 0; c < 3; c++) {
               data[i + c] = Math.min(255, Math.max(0, factorC * (data[i + c] - 128) + 128));
            }
            // Слегка уплотняем прозрачность для устранения мыла
            let alpha = data[i + 3];
            if (alpha > 0 && alpha < 255) {
                data[i + 3] = Math.max(0, Math.min(255, (alpha - 128) * 1.5 + 128));
            }
        }
        tCtx.putImageData(imageData, 0, 0);
    }

    // Сохраняем "Сырой Улучшенный Оригинал" до применения ползунка резкости
    postUpscaleBaseRef.current = {
        width: newWidth, height: newHeight,
        data: tCtx.getImageData(0, 0, newWidth, newHeight)
    };

    // Применяем текущую резкость (из ползунка) поверх нового апскейла
    applySharpnessFilter(sharpness);
  };

  const handleResetUpscale = () => {
    if (baseUpscaleStateRef.current) {
        const workCanvas = workCanvasRef.current;
        workCanvas.width = baseUpscaleStateRef.current.width;
        workCanvas.height = baseUpscaleStateRef.current.height;
        workCanvas.getContext('2d').putImageData(baseUpscaleStateRef.current.data, 0, 0);
        
        baseUpscaleStateRef.current = null;
        postUpscaleBaseRef.current = null;
        setUpscaleSettings({ factor: 1, aggressive: false });
        setSharpness(0);
        const container = containerRef.current;
		const cw = container ? container.clientWidth : 800;
		const ch = container ? container.clientHeight : 600;
		setZoom(Math.min(cw / sourceCanvas.width, ch / sourceCanvas.height, 1));
        
        renderMainCanvas();
    }
  };

  // ЭФФЕКТЫ: Заливка цветом
  const applyRecolor = () => {
    const workCanvas = workCanvasRef.current;
    if (!workCanvas) return;
    const ctx = workCanvas.getContext('2d');
    
    ctx.save();
    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = recolorHex;
    ctx.fillRect(0, 0, workCanvas.width, workCanvas.height);
    ctx.restore();
    
    saveToHistory(workCanvas);
    renderMainCanvas();
  };

  // ЭФФЕКТЫ: Умное Ч/Б (По формуле Luma)
  const applySmartBW = () => {
    const workCanvas = workCanvasRef.current;
    if (!workCanvas) return;
    const ctx = workCanvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, workCanvas.width, workCanvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      // Формула сохранения яркости для человеческого глаза
      const luma = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      data[i] = luma;
      data[i + 1] = luma;
      data[i + 2] = luma;
    }
    ctx.putImageData(imageData, 0, 0);
    saveToHistory(workCanvas);
    renderMainCanvas();
  };

  // --- Функции для панели Экспорта ---
  
  const handleWidthChange = (e) => {
    const w = parseInt(e.target.value) || 0;
    setExportSettings(s => {
       if (s.aspectLocked && s.customHeight > 0) {
          const ratio = s.customWidth / s.customHeight;
          return { ...s, customWidth: w, customHeight: Math.round(w / ratio) };
       }
       return { ...s, customWidth: w };
    });
  }

  const handleHeightChange = (e) => {
    const h = parseInt(e.target.value) || 0;
    setExportSettings(s => {
       if (s.aspectLocked && s.customWidth > 0) {
          const ratio = s.customWidth / s.customHeight;
          return { ...s, customHeight: h, customWidth: Math.round(h * ratio) };
       }
       return { ...s, customHeight: h };
    });
  }

  const applyRatio = (ratio) => {
    setExportSettings(s => ({
        ...s,
        customHeight: Math.max(1, Math.round(s.customWidth / ratio)),
        aspectLocked: true
    }));
  }

  const handleExport = () => {
    const workCanvas = workCanvasRef.current;
    if (!workCanvas) return;
    let exportCanvas = workCanvas;

    if (exportSettings.sizePreset !== 'original') {
      let targetWidth, targetHeight;

      if (exportSettings.sizePreset === 'custom') {
        targetWidth = exportSettings.customWidth || workCanvas.width;
        targetHeight = exportSettings.customHeight || workCanvas.height;
      } else {
        const sizeMap = { '128': 128, '256': 256, '512': 512, '1024': 1024, '2048': 2048 };
        const targetSize = sizeMap[exportSettings.sizePreset];
        const scale = targetSize / Math.max(workCanvas.width, workCanvas.height);
        targetWidth = Math.round(workCanvas.width * scale);
        targetHeight = Math.round(workCanvas.height * scale);
      }
      
      exportCanvas = document.createElement('canvas');
      exportCanvas.width = targetWidth; exportCanvas.height = targetHeight;
      const eCtx = exportCanvas.getContext('2d');
      eCtx.imageSmoothingEnabled = true; eCtx.imageSmoothingQuality = 'high';
      eCtx.drawImage(workCanvas, 0, 0, targetWidth, targetHeight);
    }

    const filename = exportSettings.filename || 'edited_logo';

    if (exportSettings.format === 'png') {
      const link = document.createElement('a');
      link.download = `${filename}.png`;
      link.href = exportCanvas.toDataURL('image/png');
      link.click();
    } else if (exportSettings.format === 'svg') {
      const dataUrl = exportCanvas.toDataURL('image/png');
      const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${exportCanvas.width}" height="${exportCanvas.height}" viewBox="0 0 ${exportCanvas.width} ${exportCanvas.height}"><image href="${dataUrl}" width="${exportCanvas.width}" height="${exportCanvas.height}" /></svg>`;
      const blob = new Blob([svgString], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = `${filename}.svg`;
      link.href = URL.createObjectURL(blob);
      link.click();
    }
  };

  return (
    <div className="flex h-screen w-full bg-gray-900 text-gray-100 font-sans overflow-hidden">
      
      {/* ЛЕВАЯ ПАНЕЛЬ */}
      <div className="w-64 bg-gray-800 border-r border-gray-700 flex flex-col py-4 z-10 overflow-y-auto min-w-max">
        <label className="mx-4 mb-4 p-3 bg-blue-600 rounded-xl cursor-pointer hover:bg-blue-500 transition shadow-lg flex items-center justify-center space-x-2">
          <Upload size={20} />
          <span className="font-medium text-sm">{t('upload')}</span>
          <input type="file" className="hidden" accept="image/png, image/jpeg, image/webp, application/pdf" onChange={(e) => { if (e.target.files[0]) initImage(e.target.files[0]); }} />
        </label>
        
        <div className="w-full h-px bg-gray-700 mb-2"></div>

        <ToolButton icon={<MousePointer2 size={20} />} label={t('move')} active={activeTool === 'select'} onClick={() => handleToolChange('select')} />
        <ToolButton icon={<Wand2 size={20} />} label={t('bg_remove')} active={activeTool === 'wand'} onClick={() => handleToolChange('wand')} />
        <ToolButton icon={<Crop size={20} />} label={t('crop')} active={activeTool === 'crop'} onClick={() => handleToolChange('crop')} />
        <ToolButton icon={<Palette size={20} />} label={t('effects')} active={activeTool === 'effects'} onClick={() => handleToolChange('effects')} />
        <ToolButton icon={<Zap size={20} />} label={t('upscale')} active={activeTool === 'upscale'} onClick={() => handleToolChange('upscale')} />
        <ToolButton icon={<Download size={20} />} label={t('export')} active={activeTool === 'export'} onClick={() => handleToolChange('export')} />

        <div className="flex-grow"></div>
        
        <div className="flex px-4 space-x-2 mt-4">
          <button onClick={undo} disabled={historyIndex <= 0} className={`flex-1 flex items-center justify-center space-x-1 py-2 rounded-lg transition ${historyIndex <= 0 ? 'text-gray-600 bg-gray-800 cursor-not-allowed' : 'text-gray-300 bg-gray-700 hover:bg-gray-600'}`}>
            <Undo2 size={16} /><span className="text-xs font-medium">{t('undo')}</span>
          </button>
          <button onClick={redo} disabled={historyIndex >= history.length - 1} className={`flex-1 flex items-center justify-center space-x-1 py-2 rounded-lg transition ${historyIndex >= history.length - 1 ? 'text-gray-600 bg-gray-800 cursor-not-allowed' : 'text-gray-300 bg-gray-700 hover:bg-gray-600'}`}>
            <Redo2 size={16} /><span className="text-xs font-medium">{t('redo')}</span>
          </button>
        </div>
        <button onClick={() => setLang(lang === 'ru' ? 'en' : 'ru')} className="mx-4 mt-4 mb-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm text-gray-300 transition">
            {lang === 'ru' ? '🇺🇸 Switch to English' : '🇷🇺 Переключить на русский'}
        </button>
      </div>

      {/* ХОЛСТ С ПОДДЕРЖКОЙ TOUCH */}
      <div 
        ref={containerRef} 
        className="flex-grow relative overflow-hidden cursor-crosshair touch-none"
        onMouseDown={handlePointerDown}
        onMouseMove={handlePointerMove}
        onMouseUp={handlePointerUp}
        onMouseLeave={handlePointerUp}
        onTouchStart={handlePointerDown}
        onTouchMove={handlePointerMove}
        onTouchEnd={handlePointerUp}
        onTouchCancel={handlePointerUp}
        onWheel={handleWheel}
      >
        {!imageLoaded && (
          <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-500 pointer-events-none">
            <ImageIcon size={64} className="mb-4 opacity-50" />
            <p className="text-xl font-medium">{t('hint_pdf')}</p>
            <p className="text-sm mt-2">{t('hint_upload_sub')}</p>
          </div>
        )}
        <canvas ref={mainCanvasRef} className="absolute top-0 left-0" />
        <canvas ref={workCanvasRef} className="hidden" />
      </div>

      {/* ПРАВАЯ ПАНЕЛЬ ПАРАМЕТРОВ */}
      {imageLoaded && (
        <div className="w-[340px] min-w-[340px] bg-gray-800 border-l border-gray-700 p-5 flex flex-col overflow-y-auto z-10 shadow-xl">
          <div className="flex items-center space-x-2 mb-6 text-blue-400 font-semibold">
            <Settings2 size={20} />
            <h2>{t('params')}</h2>
          </div>

          {activeTool === 'wand' && (
            <div className="space-y-5 animate-in fade-in">
              <h3 className="text-sm font-medium text-gray-300">{t('bg_remove')}</h3>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">{t('mode')}</label>
                <div className="flex rounded-lg overflow-hidden border border-gray-600">
                  <button onClick={() => setWandSettings({...wandSettings, mode: 'remove'})} className={`flex-1 py-2 text-sm ${wandSettings.mode === 'remove' ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`}>{t('mode_rm')}</button>
                  <button onClick={() => setWandSettings({...wandSettings, mode: 'keep'})} className={`flex-1 py-2 text-sm ${wandSettings.mode === 'keep' ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`}>{t('mode_keep')}</button>
                </div>
              </div>
              
              <div>
                <label className="text-xs text-gray-400 mb-1 block">{t('target_color')}</label>
                <div className="flex items-center space-x-3">
                  <input type="color" value={wandSettings.targetColor} onChange={(e) => setWandSettings({...wandSettings, targetColor: e.target.value})} className="w-10 h-10 rounded cursor-pointer bg-transparent border-0 p-0" />
                  <span className="text-sm font-mono uppercase bg-gray-900 px-2 py-1 rounded border border-gray-700">{wandSettings.targetColor}</span>
                </div>
              </div>

              <div>
                <div className="flex justify-between text-xs text-gray-400 mb-1">
                  <label>{t('tolerance')}</label>
                  <span>{wandSettings.tolerance}%</span>
                </div>
                <input type="range" min="0" max="100" value={wandSettings.tolerance} onChange={(e) => setWandSettings({...wandSettings, tolerance: parseInt(e.target.value)})} className="w-full accent-blue-500" />
              </div>

              <div className="p-3 bg-blue-900/30 rounded-lg border border-blue-800/50">
                <p className="text-xs text-blue-200">{t('hint_pipette')}</p>
              </div>

              <hr className="border-gray-700 my-4" />
              
              <div>
                <div className="flex justify-between text-xs text-gray-300 mb-1 font-medium">
                  <label>{t('smooth_edges')}</label>
                  <span className="text-blue-400">{smoothStrength}</span>
                </div>
                <p className="text-xs text-gray-500 mb-2 leading-relaxed">{t('hint_smooth')}</p>
                <input 
                  type="range" min="0" max="10" 
                  value={smoothStrength} 
                  onChange={handleSmoothChange} 
                  className="w-full accent-blue-500 cursor-grab active:cursor-grabbing" 
                />
              </div>
            </div>
          )}

          {activeTool === 'crop' && (
            <div className="space-y-6 animate-in fade-in">
              <div>
                <h3 className="text-sm font-medium text-gray-300 mb-2">{t('auto_crop')}</h3>
                <p className="text-xs text-gray-400 mb-3">{t('hint_crop')}</p>
                <button onClick={applyAutoCrop} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition shadow-lg">{t('btn_crop')}</button>
              </div>
              
              <hr className="border-gray-700" />
              
              <div>
                <h3 className="text-sm font-medium text-gray-300 mb-2">{t('eraser')}</h3>
                <p className="text-xs text-gray-400 mb-3">{t('hint_eraser')}</p>
                <div>
                  <div className="flex justify-between text-xs text-gray-400 mb-1">
                    <label>{t('brush_size')}</label>
                    <span>{eraserSize}px</span>
                  </div>
                  <input type="range" min="5" max="150" value={eraserSize} onChange={(e) => setEraserSize(parseInt(e.target.value))} className="w-full accent-blue-500" />
                </div>
                <div className="flex justify-center py-4">
                  <div className="rounded-full bg-white opacity-50 border border-gray-400 shadow-inner" style={{ width: `${Math.min(eraserSize, 100)}px`, height: `${Math.min(eraserSize, 100)}px` }}></div>
                </div>
              </div>
            </div>
          )}

          {activeTool === 'effects' && (
            <div className="space-y-6 animate-in fade-in">
              <div>
                <h3 className="text-sm font-medium text-gray-300 mb-2">{t('smart_bw')}</h3>
                <p className="text-xs text-gray-400 mb-3">{t('hint_bw')}</p>
                <button onClick={applySmartBW} className="w-full py-2.5 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition shadow-lg flex justify-center items-center space-x-2">
                  <Contrast size={16} />
                  <span>{t('btn_bw')}</span>
                </button>
              </div>

              <hr className="border-gray-700" />

              <div>
                <h3 className="text-sm font-medium text-gray-300 mb-2">{t('color_fill')}</h3>
                <p className="text-xs text-gray-400 mb-3">{t('hint_fill')}</p>
                
                <div className="flex items-center space-x-3 mb-4">
                  <input type="color" value={recolorHex} onChange={(e) => setRecolorHex(e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-0 p-0" />
                  <span className="text-sm font-mono uppercase bg-gray-900 px-2 py-1 rounded border border-gray-700">{recolorHex}</span>
                </div>
                <button onClick={applyRecolor} className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition shadow-lg">{t('btn_fill')}</button>
              </div>
            </div>
          )}

          {activeTool === 'upscale' && (
            <div className="space-y-5 animate-in fade-in">
              <h3 className="text-sm font-medium text-gray-300">{t('upscale_title')}</h3>
              <p className="text-xs text-gray-400">{t('hint_upscale')}</p>
              
              <div className="flex items-center space-x-2 p-2 bg-gray-900 border border-gray-700 rounded-lg mb-2">
                <input 
                  type="checkbox" 
                  id="aggressiveMode" 
                  checked={upscaleSettings.aggressive} 
                  onChange={e => {
                    const isAggressive = e.target.checked;
                    setUpscaleSettings(s => ({...s, aggressive: isAggressive}));
                    if (upscaleSettings.factor > 1) {
                        applyUpscaleToggle(upscaleSettings.factor, isAggressive);
                    }
                  }} 
                  className="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer" 
                />
                <label htmlFor="aggressiveMode" className="text-xs text-gray-300 cursor-pointer flex-1">
                  <span className="font-semibold block">{t('aggr_mode')}</span>
                  <span className="text-[10px] text-gray-500">{t('hint_aggr')}</span>
                </label>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <button 
                  onClick={() => applyUpscaleToggle(2)} 
                  className={`py-2 rounded-lg text-sm font-bold transition shadow-lg ${upscaleSettings.factor === 2 ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
                >{t('btn_x2')}</button>
                <button 
                  onClick={() => applyUpscaleToggle(4)} 
                  className={`py-2 rounded-lg text-sm font-bold transition shadow-lg ${upscaleSettings.factor === 4 ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
                >{t('btn_x4')}</button>
              </div>

              <hr className="border-gray-700 my-2" />

              <div>
                <div className="flex justify-between text-xs text-gray-300 mb-1 font-medium">
                  <label>{t('sharpness')}</label>
                  <span className="text-blue-400">{sharpness}%</span>
                </div>
                <p className="text-[10px] text-gray-500 mb-2 leading-relaxed">
                  {t('hint_sharp')}
                </p>
                <input 
                  type="range" min="0" max="100" 
                  value={sharpness} 
                  onChange={handleSharpnessChange} 
                  className="w-full accent-blue-500 cursor-grab active:cursor-grabbing" 
                />
              </div>
              
              {(upscaleSettings.factor > 1 || sharpness > 0) && (
                 <button onClick={handleResetUpscale} className="w-full py-2 mt-2 bg-red-900/40 hover:bg-red-900/60 text-red-300 border border-red-800/50 rounded-lg text-sm font-medium transition">
                    {t('btn_reset')}
                 </button>
              )}

              <div className="mt-4 p-3 bg-gray-900 rounded-lg text-xs font-mono text-center border border-gray-700">
                {t('canvas_size')} <br/> 
                <span className="text-blue-400 text-sm">{workCanvasRef.current?.width} x {workCanvasRef.current?.height}</span>
              </div>
            </div>
          )}

          {activeTool === 'export' && (
            <div className="space-y-5 animate-in fade-in">
              <h3 className="text-sm font-medium text-gray-300">{t('save_res')}</h3>
              
              <div>
                <label className="text-xs text-gray-400 mb-1 block">{t('filename')}</label>
                <input type="text" value={exportSettings.filename} onChange={(e) => setExportSettings({...exportSettings, filename: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
              </div>

              <div>
                <label className="text-xs text-gray-400 mb-1 block">{t('format')}</label>
                <select value={exportSettings.format} onChange={(e) => setExportSettings({...exportSettings, format: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                  <option value="svg">{t('fmt_svg')}</option>
                  <option value="png">{t('fmt_png')}</option>
                </select>
                {exportSettings.format === 'svg' && (
                  <p className="text-[10px] text-gray-500 mt-1 leading-tight">
                    {t('hint_svg')}
                  </p>
                )}
              </div>

              <div>
                <label className="text-xs text-gray-400 mb-1 block">{t('size')}</label>
                <select value={exportSettings.sizePreset} onChange={(e) => setExportSettings({...exportSettings, sizePreset: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                  <option value="original">{t('size_orig')}</option>
                  <option value="128">128 px</option>
                  <option value="256">256 px</option>
                  <option value="512">512 px</option>
                  <option value="1024">1024 px</option>
                  <option value="2048">2048 px</option>
                  <option value="custom">{t('size_custom')}</option>
                </select>
                
                {exportSettings.sizePreset === 'custom' && (
                  <div className="mt-4 p-3 bg-gray-900 border border-gray-700 rounded-xl">
                    <div className="flex space-x-2 items-end">
                      <div className="flex-1">
                        <label className="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">{t('width')}</label>
                        <input type="number" min="1" value={exportSettings.customWidth} onChange={handleWidthChange} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500" />
                      </div>
                      <button onClick={() => setExportSettings(s => ({...s, aspectLocked: !s.aspectLocked}))} className={`mb-0.5 p-1.5 rounded-lg transition-colors ${exportSettings.aspectLocked ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>
                        {exportSettings.aspectLocked ? <Link size={16}/> : <Unlink size={16}/>}
                      </button>
                      <div className="flex-1">
                        <label className="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">{t('height')}</label>
                        <input type="number" min="1" value={exportSettings.customHeight} onChange={handleHeightChange} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500" />
                      </div>
                    </div>
                    
                    <div className="flex flex-wrap gap-1.5 mt-3 justify-start">
                      <button onClick={() => {if (workCanvasRef.current) applyRatio(workCanvasRef.current.width / workCanvasRef.current.height)}} className="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-[10px] uppercase font-semibold text-gray-300">{t('ratio_orig')}</button>
                      <button onClick={() => applyRatio(1)} className="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-[10px] font-semibold text-gray-300">1:1</button>
                      <button onClick={() => applyRatio(3/4)} className="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-[10px] font-semibold text-gray-300">3:4</button>
                      <button onClick={() => applyRatio(4/3)} className="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-[10px] font-semibold text-gray-300">4:3</button>
                      <button onClick={() => applyRatio(16/9)} className="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-[10px] font-semibold text-gray-300">16:9</button>
                      
                      <button onClick={() => setExportSettings(s => ({...s, customWidth: s.customHeight, customHeight: s.customWidth}))} className="px-2 py-1 bg-gray-700 hover:bg-blue-600 rounded text-[10px] flex items-center text-gray-300 ml-auto"><ArrowRightLeft size={12}/></button>
                    </div>
                  </div>
                )}
              </div>

              <button onClick={handleExport} className="w-full py-3 mt-4 bg-green-600 hover:bg-green-500 rounded-lg text-sm font-bold transition shadow-lg flex items-center justify-center space-x-2">
                <Download size={18} /><span>{t('btn_download')}</span>
              </button>
            </div>
          )}
          
          {['select'].includes(activeTool) && (
             <div className="flex flex-col items-center justify-center h-48 text-gray-500 opacity-60">
                <MousePointer2 size={40} className="mb-3" />
                <p className="text-center text-sm">{t('hint_canvas_1')}<br/>{t('hint_canvas_2')}</p>
             </div>
          )}
        </div>
      )}
    </div>
  );
}

function ToolButton({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} className={`mx-4 my-1 p-3 rounded-xl transition-all duration-200 flex items-center space-x-3 ${ active ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-700 hover:text-white' }`}>
      <div className="w-6 h-6 flex items-center justify-center">{icon}</div>
      <span className="font-medium text-sm">{label}</span>
    </button>
  );
}

    // Рендерим приложение
	const root = createRoot(document.getElementById('root'));
	root.render(<LogoEditor />);
  </script>
</body>
</html>
